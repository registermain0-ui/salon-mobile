<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2c5fb3">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<title>サロン受付 M-V1</title>
<style>
  :root{
    --resA-fill:#EEE8FA; --resA-border:#8854D0;
    --resB-fill:#DEF7E5; --resB-border:#4CAF50;
    --hold-fill:rgba(255,200,200,.85); --hold-border:#B40000;
    --interval-fill:#FFFBE0; --interval-border:#C8C800;
    --grid-line:#DCDCDC; --grid-hour:#9a9a9a;
    --ink:#1a1a1a; --sub:#666; --accent:#2c5fb3;
    --cellW:22px; --rowH:56px; --leftW:76px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;color:var(--ink);background:#fff;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}

  /* ===== 上部操作バー ===== */
  .topbar{padding:8px 10px 6px;border-bottom:1px solid #ccc;background:#fafafa;flex:none}
  .date-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .date-btn{border:1px solid #bbb;background:#fff;border-radius:6px;padding:6px 10px;font-size:15px;font-weight:600}
  .arrow{width:36px;height:36px;border:1px solid #bbb;background:#fff;border-radius:6px;font-size:16px}
  .mode{margin-left:auto;font-size:12px;color:var(--sub)}
  .mode button{border:none;background:none;color:var(--accent);font-weight:700;font-size:13px;padding:6px 4px}
  .mode button.hold{color:#B40000}
  .btn-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
  .btn-row::-webkit-scrollbar{display:none}
  .op{flex:none;border:1px solid #bbb;background:#fff;border-radius:6px;padding:8px 13px;font-size:13px;position:relative}
  .op.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  .badge{position:absolute;top:-6px;right:-6px;background:#d32f2f;color:#fff;border-radius:9px;min-width:18px;height:18px;font-size:11px;line-height:18px;text-align:center;padding:0 4px;display:none}

  /* ===== タイムテーブル ===== */
  .tt{flex:1;overflow:auto;position:relative;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
  .tt-inner{position:relative}
  .time-head{position:sticky;top:0;z-index:3;display:flex;height:26px;background:#fff;border-bottom:1px solid var(--grid-hour)}
  .th-corner{position:sticky;left:0;z-index:4;width:var(--leftW);flex:none;background:#fff;border-right:1px solid var(--grid-hour)}
  .hour{flex:none;width:calc(6*var(--cellW));font-size:11px;border-left:1px solid var(--grid-hour);padding:5px 0 0 3px}
  .row{display:flex;height:var(--rowH);border-bottom:1px solid var(--grid-line);position:relative}
  .th-name{position:sticky;left:0;z-index:2;width:var(--leftW);flex:none;background:#fff;border-right:1px solid var(--grid-hour);font-size:12px;display:flex;flex-direction:column;justify-content:center;padding-left:6px;line-height:1.25;overflow:hidden}
  .th-name .nm{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .th-name small{font-weight:400;color:var(--sub);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .th-name small.cau{color:#c00000}
  .cells{position:relative;flex:none;width:calc(144*var(--cellW))}
  .vline{position:absolute;top:0;bottom:0;width:1px;background:var(--grid-line)}
  .vline.h{background:var(--grid-hour)}
  .off{position:absolute;top:0;bottom:0;background:#f0f0f0}
  .res{position:absolute;top:3px;bottom:3px;border-radius:4px;font-size:10px;line-height:1.35;padding:3px 4px;overflow:hidden;white-space:nowrap;z-index:1;display:flex;flex-direction:column;justify-content:center}
  .res.A{background:var(--resA-fill);border:1.5px solid var(--resA-border)}
  .res.B{background:var(--resB-fill);border:1.5px solid var(--resB-border)}
  .res b{font-size:11px}
  .res .bd{font-weight:700}
  .res .bd.red{color:#c80000}
  .itv{position:absolute;top:3px;bottom:3px;background:var(--interval-fill);border:1px dashed var(--interval-border);border-radius:3px}
  .hold{position:absolute;top:6px;bottom:6px;background:var(--hold-fill);border:2px solid var(--hold-border);border-radius:3px;z-index:1}
  .nowline{position:absolute;top:0;bottom:0;width:2px;background:#e53935;z-index:2;pointer-events:none}
  .nowline::before{content:"";position:absolute;top:0;left:-4px;border:5px solid transparent;border-top-color:#e53935}
  .empty{padding:40px 20px;text-align:center;color:var(--sub);font-size:14px;line-height:1.8}

  /* ===== ボトムシート共通 ===== */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;z-index:10}
  .sheet-bg.open{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:14px 14px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.25);max-height:82%;display:none;flex-direction:column;z-index:11;padding-bottom:env(safe-area-inset-bottom)}
  .sheet.open{display:flex}
  .grip{width:36px;height:4px;background:#ccc;border-radius:2px;margin:8px auto 4px;flex:none}
  .sheet h2{font-size:15px;padding:4px 14px 8px;border-bottom:1px solid #eee;flex:none;display:flex;align-items:center}
  .sheet-close{margin-left:auto;border:none;background:none;font-size:20px;color:#999;padding:0 4px}

  /* 最短取得 */
  .base-row{display:flex;gap:8px;align-items:center;padding:10px 14px;font-size:13px;flex:none}
  .base-row input{width:70px;border:1px solid #bbb;border-radius:6px;padding:8px;font-size:16px;text-align:center}
  .base-row button{border:1px solid #bbb;background:#fff;border-radius:6px;padding:9px 12px;font-size:13px}
  .cand{overflow-y:auto;flex:1;min-height:120px}
  .cand table{width:100%;border-collapse:collapse;font-size:13px}
  .cand th{background:#f5f5f5;padding:8px 4px;font-weight:600;border-bottom:1px solid #ddd;position:sticky;top:0}
  .cand td{padding:12px 4px;text-align:center;border-bottom:1px solid #eee}
  .cand tr.ok:active{background:#eef4ff}
  .cand tr.ng td{color:#aaa}
  .sns{border-top:1px solid #ddd;padding:8px 14px 12px;flex:none}
  .sns textarea{width:100%;height:76px;border:1px solid #ccc;border-radius:6px;font-size:12px;padding:6px;resize:none;color:#444}
  .sns .r{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
  .sns button{border:1px solid #bbb;background:#fff;border-radius:6px;padding:8px 14px;font-size:13px}

  /* 出勤登録 */
  .att-body{overflow-y:auto;flex:1;padding:8px 14px}
  .att-head{display:flex;gap:6px;font-size:12px;color:var(--sub);padding:4px 0}
  .att-head span:first-child{flex:1}
  .att-head span{width:76px;text-align:center}
  .att-row{display:flex;gap:6px;margin-bottom:6px}
  .att-row select{flex:1;border:1px solid #bbb;border-radius:6px;padding:9px 6px;font-size:14px;background:#fff;min-width:0}
  .att-row input.tm{width:76px;border:1px solid #bbb;border-radius:6px;padding:9px 4px;font-size:14px;text-align:center;flex:none}
  .att-row input.err{border-color:#d32f2f}
  .sheet-foot{flex:none;display:flex;gap:10px;padding:10px 14px;border-top:1px solid #ddd}
  .sheet-foot .sub{border:1px solid #bbb;background:#fff;border-radius:8px;padding:11px 14px;font-size:14px}
  .sheet-foot .main{flex:1;border:none;background:var(--accent);color:#fff;border-radius:8px;padding:11px;font-size:15px;font-weight:700}

  /* メニュー */
  .menu-body{padding:10px 14px 16px}
  .menu-body button{display:block;width:100%;border:1px solid #bbb;background:#fff;border-radius:8px;padding:13px;font-size:15px;margin-bottom:10px;text-align:left}
  .menu-note{font-size:12px;color:var(--sub);line-height:1.6;padding:4px 2px}

  /* ===== 予約入力(全画面) ===== */
  .form-page{position:fixed;inset:0;background:#fff;z-index:20;display:none;flex-direction:column;padding-top:env(safe-area-inset-top)}
  .form-page.open{display:flex}
  .form-head{flex:none;display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #ccc;background:#fafafa}
  .form-head .back{border:none;background:none;font-size:15px;color:var(--accent);padding:4px 8px 4px 0}
  .form-head h2{font-size:16px}
  .form-body{flex:1;overflow-y:auto;padding:12px 14px 20px}
  .caution{background:#fff2f2;border:1px solid #e8b0b0;color:#c00000;font-size:13px;font-weight:700;border-radius:6px;padding:8px 10px;margin-bottom:12px;white-space:pre-wrap;display:none}
  .fg{margin-bottom:12px;min-width:0}
  .fg label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px}
  .fg input,.fg select{width:100%;border:1px solid #bbb;border-radius:8px;padding:11px 10px;font-size:16px;background:#fff}
  .fg input[readonly]{background:#f5f5f5}
  .fg-row{display:flex;gap:10px}
  .fg-row .fg{flex:1}
  .seg{display:flex;border:1px solid #bbb;border-radius:8px;overflow:hidden}
  .seg button{flex:1;border:none;background:#fff;padding:12px 0;font-size:14px}
  .seg button.on{background:var(--accent);color:#fff;font-weight:700}
  .total{font-size:22px;font-weight:800;text-align:right;padding:6px 2px;border-bottom:2px solid var(--ink)}
  .chk{display:flex;align-items:center;gap:8px;font-size:14px;padding:8px 0}
  .chk input{width:22px;height:22px}
  .form-foot{flex:none;display:flex;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));border-top:1px solid #ccc;background:#fafafa}
  .form-foot .del{flex:none;border:1px solid #d32f2f;color:#d32f2f;background:#fff;border-radius:8px;padding:12px 16px;font-size:14px}
  .form-foot .save{flex:1;border:none;background:var(--accent);color:#fff;border-radius:8px;padding:12px;font-size:16px;font-weight:700}

  /* トースト */
  #toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(20px);background:rgba(30,30,30,.9);color:#fff;font-size:13px;padding:10px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:.25s;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- 上部操作バー -->
<div class="topbar">
  <div class="date-row">
    <button class="arrow" id="prevDay">‹</button>
    <button class="date-btn" id="dateLabel">----/--/--</button>
    <input type="date" id="datePick" style="position:absolute;opacity:0;width:1px;height:1px;pointer-events:none">
    <button class="arrow" id="nextDay">›</button>
    <span class="mode">モード: <button id="modeLink">受付</button></span>
  </div>
  <div class="btn-row">
    <button class="op primary" id="btnShortest">最短取得</button>
    <button class="op" id="btnNow">現在時刻</button>
    <button class="op" id="btnAttendance">出勤</button>
    <button class="op" id="btnMenu">データ<span class="badge" id="sendBadge">0</span></button>
  </div>
</div>

<!-- タイムテーブル -->
<div class="tt" id="tt">
  <div class="tt-inner" id="ttInner">
    <div class="time-head" id="thead">
      <div class="th-corner"></div>
    </div>
    <div id="rows"></div>
  </div>
</div>

<!-- シート背景 -->
<div class="sheet-bg" id="sheetBg"></div>

<!-- 最短取得シート -->
<div class="sheet" id="shortSheet">
  <div class="grip"></div>
  <h2>最短取得<button class="sheet-close">×</button></h2>
  <div class="base-row">
    基準時刻 <input id="baseTime" inputmode="numeric">
    <button id="baseNow">現在時刻</button>
    <button id="baseRecalc">再計算</button>
  </div>
  <div class="cand">
    <table>
      <thead><tr><th>セラピスト</th><th>最短開始</th><th>最大コース</th></tr></thead>
      <tbody id="candBody"></tbody>
    </table>
  </div>
  <div class="sns">
    <textarea id="snsText" readonly></textarea>
    <div class="r"><button id="snsFormat">フォーマット</button><button id="snsCopy">コピー</button></div>
  </div>
</div>

<!-- 出勤登録シート -->
<div class="sheet" id="attSheet">
  <div class="grip"></div>
  <h2>出勤登録<button class="sheet-close">×</button></h2>
  <div class="att-body">
    <div class="att-head"><span>セラピスト</span><span>出勤</span><span>終了</span></div>
    <div id="attRows"></div>
  </div>
  <div class="sheet-foot">
    <button class="sub" id="attAddTherapist">+ 新規セラピスト</button>
    <button class="main" id="attSave">保存</button>
  </div>
</div>

<!-- メニュー(データ移行)シート -->
<div class="sheet" id="menuSheet">
  <div class="grip"></div>
  <h2>データ<button class="sheet-close">×</button></h2>
  <div class="menu-body">
    <button id="expData">エクスポート(バックアップ保存)</button>
    <button id="impData">インポート(バックアップ読込)</button>
    <input type="file" id="impFile" accept="application/json" style="display:none">
    <p class="menu-note">データはこの端末内に保存されます。機種変更やPCとの連携にはエクスポートしたファイルを使用してください。(PC同期はM-V3で対応予定)</p>
  </div>
</div>

<!-- 予約入力(全画面) -->
<div class="form-page" id="formPage">
  <div class="form-head">
    <button class="back" id="fBack">‹ 戻る</button>
    <h2 id="formTitle">予約追加</h2>
  </div>
  <div class="form-body">
    <div class="caution" id="fCaution"></div>
    <div class="fg"><label>指名セラピスト</label><select id="fTherapist"></select></div>
    <div class="fg-row">
      <div class="fg"><label>開始時間</label><input id="fStart" inputmode="numeric" placeholder="例 2130 / 26:30"></div>
      <div class="fg"><label>コース(分)</label><select id="fCourse"></select></div>
      <div class="fg"><label>延長(分)</label><select id="fExt"></select></div>
    </div>
    <div class="fg"><label>終了時間(自動計算)</label><input id="fEnd" readonly></div>
    <div class="fg-row">
      <div class="fg"><label>顧客名</label><input id="fCustomer" placeholder="例: 田中様"></div>
      <div class="fg" style="max-width:110px"><label>下四桁</label><input id="fPhone" inputmode="numeric" maxlength="4"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>顧客属性</label><select id="fAttr"><option value=""></option><option>N</option><option>R</option></select></div>
      <div class="fg"><label>指名</label><select id="fNom"><option value=""></option><option>F</option><option>写</option><option>本</option><option>姫</option></select></div>
    </div>
    <div class="fg"><label>支払い</label>
      <div class="seg"><button id="payCash" class="on">現金</button><button id="payPaypay">PAYPAY</button></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>割引額</label><select id="fDiscount"></select></div>
      <div class="fg"><label>OP</label><select id="fOp"><option value=""></option><option>有</option><option>無</option></select></div>
    </div>
    <div class="fg"><label>総額(自動計算)</label><div class="total" id="fTotal">—</div></div>
    <div class="fg"><label>メモ</label><input id="fMemo"></div>
    <div class="chk"><input type="checkbox" id="fSendC"><label for="fSendC" style="margin:0;font-size:14px;color:var(--ink)">顧客送信 済</label></div>
    <div class="chk"><input type="checkbox" id="fSendT"><label for="fSendT" style="margin:0;font-size:14px;color:var(--ink)">女性送信 済</label></div>
  </div>
  <div class="form-foot">
    <button class="del" id="fDelete">削除</button>
    <button class="save" id="fSave">登録</button>
  </div>
</div>

<div id="toast"></div>

<script>
// 時刻ヘッダー(7:00〜30:00)を生成
(function(){
  const thead = document.getElementById("thead");
  for (let h = 7; h <= 30; h++) {
    const d = document.createElement("div");
    d.className = "hour";
    d.textContent = h + ":00";
    thead.appendChild(d);
  }
})();
</script>
<script src="./app.js"></script>
</body>
</html>
